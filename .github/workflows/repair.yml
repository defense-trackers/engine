name: repair
on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  repair:
    # Only fires on the 'incident' label, and only on the self-hosted runner
    # (the RigRun box). NOTE: this engine repo is PUBLIC. Untrusted-code exposure
    # is kept low by (a) never accepting fork-PR workflow runs, (b) requiring the
    # 'incident' label which only maintainers can apply, and (c) branch protection
    # on main so the build/run path only executes reviewed code. This workflow is
    # experimental and dormant until a self-hosted runner + RIGRUN_URL are wired.
    if: github.event.label.name == 'incident'
    runs-on: [self-hosted, rigrun]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.22"

      - name: Attempt self-repair via RigRun
        id: repair
        env:
          RIGRUN_URL: ${{ secrets.RIGRUN_URL }}
        run: bash scripts/repair.sh "${{ github.event.issue.number }}"

      - name: Golden + unit gate
        run: go test ./...

      - name: Open PR if a fix was produced
        if: success() && steps.repair.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="repair/issue-${{ github.event.issue.number }}"
          git config user.name  "tracker-bot"
          git config user.email "tracker-bot@users.noreply.github.com"
          git checkout -b "$branch"
          git add -A
          git commit -m "repair: regenerate parser for #${{ github.event.issue.number }}"
          git push -u origin "$branch"
          gh pr create --label repair --fill \
            --title "Self-repair: #${{ github.event.issue.number }}" \
            --body "RigRun-regenerated parser. Golden + unit tests pass in CI. **Human merge required** — review the parser diff and the regenerated golden fixture before merging. Code never self-merges; only invariant-gated data does."
