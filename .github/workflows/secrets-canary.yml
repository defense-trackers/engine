name: secrets-canary
on:
  schedule:
    - cron: "11 9 * * 1"   # Mondays
  workflow_dispatch: {}

permissions:
  issues: write

jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - name: Exercise SAM.gov key
        env:
          SAM_API_KEY: ${{ secrets.SAM_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "${SAM_API_KEY:-}" ]; then
            echo "no SAM_API_KEY set yet; skipping"
            exit 0
          fi
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://api.sam.gov/prod/opportunities/v2/search?limit=1&postedFrom=01/01/2026&postedTo=01/02/2026&api_key=${SAM_API_KEY}")
          echo "SAM.gov -> HTTP $code"
          case "$code" in
            401|403)
              gh issue create --repo "${{ github.repository }}" --label secrets \
                --title "SAM.gov key failing (HTTP $code)" \
                --body "Weekly canary received HTTP $code. Rotate the key (see RENEWALS.md) and update the SAM_API_KEY secret." || true ;;
            *)
              echo "key healthy" ;;
          esac
