name: secrets-canary
on:
  schedule:
    - cron: "11 9 * * 1"   # Mondays
  workflow_dispatch: {}

permissions:
  issues: write

jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - name: Exercise SAM.gov key
        env:
          SAM_API_KEY: ${{ secrets.SAM_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "${SAM_API_KEY:-}" ]; then
            echo "no SAM_API_KEY set yet; skipping"
            exit 0
          fi
          # Auth via header only — the key must never appear in a URL (it would
          # land in proxy/redirect logs and the runner process table). A rolling
          # recent window keeps the request inside SAM's 1-year postedFrom limit.
          to=$(date -u +%m/%d/%Y)
          from=$(date -u -d '7 days ago' +%m/%d/%Y)
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "X-Api-Key: ${SAM_API_KEY}" \
            "https://api.sam.gov/prod/opportunities/v2/search?limit=1&postedFrom=${from}&postedTo=${to}")
          echo "SAM.gov -> HTTP $code"
          case "$code" in
            401|403)
              gh issue create --repo "${{ github.repository }}" --label secrets \
                --title "SAM.gov key failing (HTTP $code)" \
                --body "Weekly canary received HTTP $code. Rotate the key (see RENEWALS.md) and update the SAM_API_KEY secret." || true ;;
            *)
              echo "key healthy" ;;
          esac
