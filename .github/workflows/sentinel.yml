name: sentinel
on:
  schedule:
    - cron: "23 7 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  sentinel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout engine
        uses: actions/checkout@v4

      - name: Checkout public site repo
        uses: actions/checkout@v4
        with:
          repository: defense-trackers/defense-trackers.github.io
          path: site
          ssh-key: ${{ secrets.SITE_DEPLOY_KEY }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - run: go build -o bin/engine .

      - name: Sentinel
        id: s
        run: |
          set +e
          ./bin/engine sentinel --out site
          echo "code=$?" >> "$GITHUB_OUTPUT"

      - name: Commit flipped status
        working-directory: site
        run: |
          git config user.name  "tracker-bot"
          git config user.email "tracker-bot@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || { git commit -m "sentinel: $(date -u +%FT%TZ)"; git push; }

      - name: Heartbeat (external dead-man switch)
        # If THIS job stops running, the external monitor (healthchecks.io etc.)
        # alarms — catching the case where Actions itself silently disables cron.
        run: curl -fsS --retry 3 "${{ secrets.HEARTBEAT_URL }}" || true

      - name: Open issue if stale
        if: steps.s.outputs.code == '3'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create --repo "${{ github.repository }}" --label stale \
            --title "stale sources $(date -u +%F)" \
            --body "Sentinel flagged sources with no successful update past 1.5x their cadence. See site/data/status.json." || true
