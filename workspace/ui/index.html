<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Realizer — private command deck</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Cdefs%3E%3ClinearGradient%20id='g'%20x1='0'%20y1='0'%20x2='1'%20y2='1'%3E%3Cstop%20offset='0'%20stop-color='%238fb3c4'/%3E%3Cstop%20offset='1'%20stop-color='%236e96a8'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle%20cx='16'%20cy='16'%20r='13'%20fill='none'%20stroke='url(%23g)'%20stroke-width='2'/%3E%3Ccircle%20cx='16'%20cy='16'%20r='4'%20fill='%23bed2e1'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#060a12; --bg2:#050b18; --bg0:#04060c; --panel:rgba(190,210,225,.045); --panel2:rgba(190,210,225,.08);
    --line:rgba(190,210,225,.10); --line2:rgba(190,210,225,.18);
    --ink:#e8ecee; --dim:#98a4b0; --faint:#7e8b96;
    --brand:#8fb3c4; --brand2:#6e96a8; --cyan:#bed2e1;
    --ok:#6fbf9b; --warn:#d8b87e; --bad:#d97a86;
    --disp:'Space Grotesk',ui-sans-serif,system-ui,sans-serif;
    --sans:'Inter',ui-sans-serif,system-ui,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,"Cascadia Mono",Consolas,monospace;
    --glow:0 0 0 1px var(--line) inset, 0 20px 50px -20px rgba(0,0,0,.7);
    --r:16px;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  .ic-svg{width:15px;height:15px;display:inline-block;vertical-align:-3px}
  .bar svg,.chip svg{width:12px;height:12px;vertical-align:-2px;margin-right:2px}
  .section-h .ic svg{width:16px;height:16px}
  button.act svg{vertical-align:-3px;margin-right:3px}
  .realize svg,.qa button svg,.aabtn svg,.who svg{width:13px;height:13px;vertical-align:-2px;margin-right:4px}
  body{
    margin:0;color:var(--ink);font:15px/1.55 var(--sans);
    background:var(--bg); overflow-x:hidden; min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  /* ---------- living background ---------- */
  #bg{position:fixed;inset:0;z-index:-2;display:block;width:100vw;height:100vh}
  #fx{position:fixed;inset:0;z-index:-3;overflow:hidden;background:
     radial-gradient(1200px 700px at 78% -8%, #15294a 0%, transparent 60%),
     radial-gradient(1000px 800px at 12% 110%, #0e1a30 0%, transparent 55%),
     linear-gradient(180deg,#060a12,#070a14 60%,#060a12)}
  #fx::before,#fx::after{content:"";position:absolute;border-radius:50%;filter:blur(90px);opacity:.5;mix-blend-mode:screen}
  #fx::before{width:55vw;height:55vw;left:-10vw;top:-15vw;
     background:radial-gradient(circle,rgba(143,179,196,.55),transparent 70%);animation:drift1 22s ease-in-out infinite alternate}
  #fx::after{width:50vw;height:50vw;right:-12vw;bottom:-18vw;
     background:radial-gradient(circle,rgba(110,150,168,.5),transparent 70%);animation:drift2 26s ease-in-out infinite alternate}
  #grid{position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.5;
     background-image:linear-gradient(rgba(120,160,220,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(120,160,220,.05) 1px,transparent 1px);
     background-size:46px 46px;mask-image:radial-gradient(circle at 50% 30%,#000 0%,transparent 78%)}
  @keyframes drift1{to{transform:translate(8vw,6vh) scale(1.15)}}
  @keyframes drift2{to{transform:translate(-7vw,-5vh) scale(1.2)}}

  /* ---------- header / nav ---------- */
  header{display:flex;align-items:center;gap:18px;padding:14px 26px;position:sticky;top:0;z-index:30;
    background:linear-gradient(180deg,rgba(7,10,20,.86),rgba(7,10,20,.55));backdrop-filter:blur(16px) saturate(140%);
    border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:center;gap:11px;font-family:var(--disp);font-weight:700;letter-spacing:.04em;font-size:16px}
  .brand .orb{width:22px;height:22px;border-radius:50%;background:conic-gradient(from 0deg,var(--cyan),var(--brand),var(--brand2),var(--cyan));
    box-shadow:0 0 18px rgba(143,179,196,.7);animation:spin 7s linear infinite;position:relative}
  .brand .orb::after{content:"";position:absolute;inset:5px;border-radius:50%;background:var(--bg)}
  @keyframes spin{to{transform:rotate(360deg)}}
  .brand b{background:linear-gradient(90deg,#e8ecee,#acc6d6);-webkit-background-clip:text;background-clip:text;color:transparent}
  .priv{font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:var(--cyan);
    border:1px solid rgba(190,210,225,.3);border-radius:999px;padding:3px 9px;background:rgba(190,210,225,.06)}
  nav{position:relative;display:flex;gap:3px;margin-left:10px;padding:4px;border-radius:14px;background:rgba(255,255,255,.03);border:1px solid var(--line)}
  .tab{position:relative;z-index:1;background:none;border:none;color:var(--dim);font:600 13px/1 var(--sans);padding:9px 15px;border-radius:10px;cursor:pointer;transition:color .25s}
  .tab:hover{color:var(--ink)}
  .tab.active{color:#fff}
  .tab-ind{position:absolute;top:4px;bottom:4px;left:0;width:0;z-index:0;border-radius:10px;pointer-events:none;
    background:linear-gradient(180deg,rgba(143,179,196,.30),rgba(110,150,168,.20));border:1px solid rgba(143,179,196,.5);
    box-shadow:0 0 24px -5px rgba(143,179,196,.7);transition:transform .34s cubic-bezier(.5,0,.15,1),width .34s cubic-bezier(.5,0,.15,1),opacity .3s}
  .spacer{flex:1}
  #stat{font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:.02em}
  button.act{background:rgba(255,255,255,.05);border:1px solid var(--line2);color:var(--ink);font:600 13px/1 var(--sans);
    padding:9px 15px;border-radius:11px;cursor:pointer;transition:.2s}
  button.act:hover{border-color:var(--brand);box-shadow:0 0 20px -6px var(--brand);transform:translateY(-1px)}
  main{padding:30px 26px 80px;max-width:1320px;margin:0 auto}
  h2{font-family:var(--disp);font-size:13px;font-weight:600;letter-spacing:.18em;color:var(--dim);text-transform:uppercase;margin:0 0 16px}
  .sub{color:var(--dim);font-size:13.5px;margin:-8px 0 20px;max-width:880px}

  /* ---------- cards / grid ---------- */
  .grid{display:grid;gap:14px}
  .card{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;
    backdrop-filter:blur(14px);box-shadow:var(--glow);transition:transform .22s cubic-bezier(.2,.7,.3,1),border-color .22s,box-shadow .22s;
    animation:fadeUp .5s both}
  .card:hover{transform:translateY(-3px);border-color:var(--line2);box-shadow:0 0 0 1px var(--line2) inset,0 26px 60px -24px rgba(0,0,0,.85),0 0 36px -16px var(--brand)}
  .card.now::before{content:"";position:absolute;left:0;top:14px;bottom:14px;width:3px;border-radius:3px;
    background:linear-gradient(var(--warn),var(--bad));box-shadow:0 0 14px var(--warn)}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}}
  .ctop{display:flex;justify-content:space-between;gap:14px;align-items:flex-start}
  .ctitle{font-family:var(--disp);font-weight:600;font-size:15.5px;line-height:1.3;letter-spacing:.01em}
  .ctitle a{color:var(--ink);text-decoration:none;background-image:linear-gradient(var(--brand),var(--brand));background-size:0% 1px;background-position:0 100%;background-repeat:no-repeat;transition:background-size .25s}
  .ctitle a:hover{color:#fff;background-size:100% 1px}
  .meta{font-family:var(--mono);font-size:11.5px;color:var(--dim);margin-top:6px;display:flex;flex-wrap:wrap;gap:10px}
  .score{font-family:var(--mono);font-weight:700;font-size:24px;text-align:right;min-width:46px;
    background:linear-gradient(180deg,#fff,#acc6d6);-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 0 24px rgba(143,179,196,.3)}
  .score small{display:block;font-weight:500;font-size:9.5px;color:var(--dim);-webkit-text-fill-color:var(--dim);letter-spacing:.1em}
  .bars{display:flex;gap:7px;margin-top:11px;flex-wrap:wrap}
  .bar{font-family:var(--mono);font-size:11px;color:var(--dim);background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:8px;padding:3px 9px;transition:.2s}
  .bar b{color:var(--ink)}
  .bar.asset{color:var(--brand);border-color:rgba(143,179,196,.3);background:rgba(143,179,196,.07)}
  .soon{color:var(--warn)} .exp{color:var(--bad)}
  .bar.hw{color:var(--bad);border-color:rgba(217,122,134,.3);background:rgba(217,122,134,.06)}
  .bar.team{color:#79b3ad;border-color:rgba(90,208,192,.32);background:rgba(90,208,192,.07)}
  .bar.usv{color:#8fb3c4;border-color:rgba(127,193,255,.32);background:rgba(127,193,255,.07)}
  .bar.clr{color:var(--warn);border-color:rgba(216,184,126,.3);background:rgba(216,184,126,.06)}
  .bar.ally{color:#9fbccb;border-color:rgba(197,163,255,.32);background:rgba(197,163,255,.07)}
  .ctl{display:flex;gap:9px;margin-top:13px;flex-wrap:wrap;align-items:center}
  select,textarea,input[type=number]{background:rgba(255,255,255,.04);border:1px solid var(--line2);color:var(--ink);font:inherit;border-radius:10px;padding:7px 10px;transition:.2s}
  select:focus,textarea:focus,input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(143,179,196,.15)}
  textarea{flex:1;min-width:200px;resize:vertical;min-height:36px;font-size:13px}
  .pill{font-family:var(--mono);font-size:11px;padding:3px 9px;border-radius:999px;border:1px solid var(--line);color:var(--dim)}
  .pill.bid{color:var(--ok);border-color:rgba(111,191,155,.35)}.pill.nobid{color:var(--bad);border-color:rgba(217,122,134,.35)}
  .kanban{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;align-items:start}
  .col{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:12px;min-height:80px;backdrop-filter:blur(12px)}
  .col h3{font-size:11px;font-family:var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin:0 0 10px;display:flex;justify-content:space-between}
  .col h3 span{color:var(--brand)}
  .kc{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:11px;padding:10px 11px;margin-bottom:9px;transition:.2s}
  .kc:hover{border-color:var(--line2);transform:translateY(-1px)}
  .kc .t{font-size:13px;font-weight:600;line-height:1.3}
  .kc .m{font-family:var(--mono);font-size:11px;color:var(--dim);margin-top:4px}
  input.filter{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--line2);color:var(--ink);font:inherit;border-radius:13px;padding:13px 17px;margin-bottom:8px}
  input.filter:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(143,179,196,.15)}
  .empty{color:var(--dim);font-style:italic;padding:10px}
  @media(max-width:1000px){.kanban{grid-template-columns:1fr 1fr}}

  /* ---------- Today / hero ---------- */
  .hero{position:relative;overflow:hidden;border:1px solid var(--line2);border-radius:24px;padding:34px 34px 30px;margin-bottom:22px;
    background:linear-gradient(135deg,rgba(143,179,196,.10),rgba(110,150,168,.06) 45%,rgba(7,11,20,.2));
    box-shadow:0 30px 80px -40px rgba(0,0,0,.9),0 0 0 1px var(--line) inset}
  .hero::before{content:"";position:absolute;inset:0;background:
     radial-gradient(600px 240px at 90% -30%,rgba(190,210,225,.18),transparent 60%);pointer-events:none}
  .hero::after{content:"";position:absolute;left:0;right:0;top:0;height:1px;
     background:linear-gradient(90deg,transparent,rgba(124,160,255,.7),transparent);animation:scan 5s ease-in-out infinite}
  @keyframes scan{0%,100%{opacity:.2;transform:translateY(0)}50%{opacity:.9;transform:translateY(2px)}}
  .hero .date{font-family:var(--mono);font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:var(--cyan);display:flex;align-items:center;gap:8px}
  .hero .date::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--cyan);box-shadow:0 0 12px var(--cyan);animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{50%{opacity:.35;transform:scale(.7)}}
  .hero .lead{font-family:var(--disp);font-size:30px;font-weight:700;line-height:1.18;margin:14px 0 6px;max-width:880px;letter-spacing:-.01em;
    background:linear-gradient(120deg,#ffffff 20%,#bed2e1 55%,#9fbccb 90%);-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero .leadsub{color:var(--dim);font-size:14.5px;max-width:680px}
  .statstrip{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin:18px 0 26px}
  .stat{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:15px;padding:15px 16px;backdrop-filter:blur(12px);overflow:hidden;animation:fadeUp .5s both}
  .stat::after{content:"";position:absolute;left:0;bottom:0;height:2px;width:100%;background:linear-gradient(90deg,transparent,var(--brand),transparent);opacity:.5}
  .stat .n{font-family:var(--mono);font-weight:700;font-size:27px;line-height:1;letter-spacing:-.02em}
  .stat .l{font-size:10.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.13em;margin-top:8px}
  .stat.ev .n{background:linear-gradient(180deg,#a9d8c2,var(--ok));-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 0 22px rgba(111,191,155,.35)}
  .stat.now .n{color:var(--warn);text-shadow:0 0 22px rgba(216,184,126,.3)}
  .stat.new .n{background:linear-gradient(180deg,#bed2e1,var(--brand));-webkit-background-clip:text;background-clip:text;color:transparent}
  .section-h{display:flex;align-items:center;gap:12px;margin:26px 0 12px}
  .section-h .ic{width:30px;height:30px;display:grid;place-items:center;border-radius:10px;font-size:15px;border:1px solid var(--line2);background:rgba(255,255,255,.04)}
  .section-h h3{margin:0;font-family:var(--disp);font-size:13px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink)}
  .section-h .cnt{font-family:var(--mono);font-size:11px;color:var(--dim);background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:999px;padding:2px 9px}
  .section-h.deadline .ic{color:var(--warn);border-color:rgba(216,184,126,.4);box-shadow:0 0 18px -6px var(--warn)}
  .section-h.qa .ic{color:var(--ok);border-color:rgba(111,191,155,.4);box-shadow:0 0 18px -6px var(--ok)}
  .section-h.new .ic{color:var(--brand);border-color:rgba(143,179,196,.4);box-shadow:0 0 18px -6px var(--brand)}
  .section-h.team .ic{color:#79b3ad;border-color:rgba(90,208,192,.4);box-shadow:0 0 18px -6px #79b3ad}
  .section-h.move .ic{color:#8d9fc4;border-color:rgba(182,156,255,.4);box-shadow:0 0 18px -6px #8d9fc4}
  .tgrid{display:grid;gap:12px;grid-template-columns:repeat(2,1fr)}
  .tcard{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:15px;padding:15px 17px;cursor:pointer;
    backdrop-filter:blur(12px);transition:transform .2s cubic-bezier(.2,.7,.3,1),border-color .2s,box-shadow .2s;display:flex;flex-direction:column;gap:7px;
    animation:fadeUp .5s both}
  .tcard:hover{border-color:var(--line2);transform:translateY(-3px);box-shadow:0 22px 50px -26px rgba(0,0,0,.85),0 0 30px -14px var(--brand)}
  .tcard .tt{font-family:var(--disp);font-weight:600;font-size:14.5px;line-height:1.32}
  .tcard .td{font-family:var(--mono);font-size:11px;color:var(--dim);display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .tcard .det{font-size:13px;color:#aebccb;line-height:1.5}
  .tcard.l-deadline{border-left:3px solid var(--warn)} .tcard.l-deadline.l-urgent{border-left-color:var(--bad);box-shadow:0 0 30px -18px var(--bad)}
  .tcard.l-qa{border-left:3px solid var(--ok)} .tcard.l-new{border-left:3px solid var(--brand)}
  .tcard.l-move{border-left:3px solid #8d9fc4} .tcard.l-teaming{border-left:3px solid #79b3ad}
  .chip{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:999px;border:1px solid var(--line);color:var(--dim)}
  .chip.urgent{color:var(--bad);border-color:rgba(217,122,134,.4);background:rgba(217,122,134,.07)}
  .chip.soon{color:var(--warn);border-color:rgba(216,184,126,.35)}
  .chip.asset{color:var(--brand);border-color:rgba(143,179,196,.35)}.chip.fit{color:var(--ink)}
  .ready{display:inline-block;height:6px;width:64px;border-radius:4px;background:rgba(255,255,255,.08);overflow:hidden;vertical-align:middle}
  .ready i{display:block;height:100%;border-radius:4px}
  .tempty{color:var(--dim);font-style:italic;padding:8px 2px;grid-column:1/-1}
  .pushrow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:14px}
  .pushrow .hint{font-size:12.5px;color:var(--dim)}
  .hwtoggle{display:flex;align-items:center;gap:9px;color:var(--dim);font-size:12.5px;margin:-2px 0 16px;cursor:pointer}
  .hwtoggle input{accent-color:var(--brand);width:15px;height:15px}
  code{background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:6px;padding:2px 6px;font:500 12.5px var(--mono);color:#bed2e1}
  @media(max-width:820px){.statstrip{grid-template-columns:repeat(2,1fr)}.tgrid{grid-template-columns:1fr}.hero .lead{font-size:23px}main{padding:22px 16px 70px}}

  /* ---------- Claude assistant slide-over ---------- */
  .realize{margin-left:auto;background:linear-gradient(135deg,rgba(143,179,196,.22),rgba(110,150,168,.22));border:1px solid rgba(143,179,196,.45);color:#dbe6ec;
    font:600 13px/1 var(--sans);padding:8px 14px;border-radius:11px;cursor:pointer;white-space:nowrap;transition:.2s}
  .realize:hover{box-shadow:0 0 26px -6px var(--brand2);transform:translateY(-1px);color:#fff}
  #overlay{position:fixed;inset:0;background:rgba(3,5,10,.6);backdrop-filter:blur(3px);display:none;z-index:40}
  #assist{position:fixed;top:0;right:0;height:100%;width:480px;max-width:95vw;
    background:linear-gradient(180deg,rgba(10,14,24,.96),rgba(8,11,20,.98));border-left:1px solid var(--line2);
    transform:translateX(100%);transition:transform .26s cubic-bezier(.2,.8,.2,1);z-index:41;display:flex;flex-direction:column;box-shadow:-30px 0 80px -30px #000}
  #assist.open{transform:none}
  .ah{padding:16px 18px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,rgba(143,179,196,.08),transparent)}
  .ah .x{float:right;background:none;border:none;color:var(--dim);font-size:22px;cursor:pointer;line-height:1;transition:.2s}.ah .x:hover{color:var(--bad)}
  .ah .who{font-family:var(--mono);font-size:10px;letter-spacing:.22em;color:var(--cyan)}
  .ah .ot{font-family:var(--disp);font-weight:600;margin-top:5px;line-height:1.3;font-size:15px}
  .ah .om{font-family:var(--mono);font-size:11px;color:var(--dim);margin-top:5px}
  #assist-poc{margin-top:10px;display:flex;flex-direction:column;gap:4px}
  .poc{font-size:12px;color:#aebccb}.poc b{color:var(--ink)}.poc a{color:var(--brand)}
  .poc.chan{color:var(--ok);font-family:var(--mono);font-size:11px}
  .qa{display:flex;flex-wrap:wrap;gap:7px;padding:12px 18px;border-bottom:1px solid var(--line)}
  .qa button{background:rgba(255,255,255,.05);border:1px solid var(--line2);color:var(--ink);font:500 12px var(--sans);padding:6px 11px;border-radius:9px;cursor:pointer;transition:.2s}
  .qa button:hover{border-color:var(--brand);box-shadow:0 0 16px -6px var(--brand)}
  .qa .mv{color:var(--ok);border-color:rgba(111,191,155,.3)}
  #thread{flex:1;overflow:auto;padding:16px 18px;display:flex;flex-direction:column;gap:13px}
  .msg{font-size:14px;line-height:1.6;white-space:pre-wrap;word-wrap:break-word}
  .msg.u{color:var(--brand);font-family:var(--mono);font-size:12px}
  .msg.a{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:13px;padding:13px 15px}
  .msg.err{color:var(--bad);font-size:13px}
  .ask{display:flex;gap:9px;padding:14px 18px;border-top:1px solid var(--line)}
  .ask textarea{flex:1;min-height:40px;max-height:150px}
  .ask button{background:linear-gradient(135deg,var(--brand),var(--brand2));border:none;color:#04101e;font:700 14px var(--sans);border-radius:11px;padding:0 18px;cursor:pointer;transition:.2s}
  .ask button:hover{box-shadow:0 0 24px -6px var(--brand)}
  .disabled-note{padding:16px 18px;color:var(--warn);font-size:13px;line-height:1.6}
  .qalabel{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin:10px 0 5px;width:100%}
  .qarow{display:flex;flex-wrap:wrap;gap:7px;width:100%}
  .scorecard{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:12px;margin-bottom:6px}
  .sc-head{display:flex;justify-content:space-between;font-size:12px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;color:var(--dim)}
  .sc-head b{font-size:15px}.sc-head .ok{color:var(--ok)}.sc-head .warn{color:var(--warn)}.sc-head .bad{color:var(--bad)}
  .sc-weak{font-size:11px;color:var(--warn);margin-top:4px}
  .wall{display:flex;align-items:center;gap:9px;margin-top:7px}
  .wall .wname{font-size:12px;color:var(--dim);width:112px}
  .wall select,.wall input{flex:1;font-size:12px;padding:5px 7px}
  .aabtn{width:100%;margin-top:9px;background:linear-gradient(135deg,rgba(110,150,168,.25),rgba(143,179,196,.18));border:1px solid rgba(143,179,196,.45);color:#cfe0ea;font:600 12px var(--sans);padding:9px 11px;border-radius:11px;cursor:pointer;transition:.2s}
  .aabtn:hover{box-shadow:0 0 22px -6px var(--brand2)}.aabtn:disabled{opacity:.6;cursor:wait}
  .phead{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px}.phead h2{margin:0}
  .playbook{max-width:780px;line-height:1.7}
  .playbook h1{font-family:var(--disp);font-size:26px;margin:0 0 6px;background:linear-gradient(120deg,#fff,#bed2e1);-webkit-background-clip:text;background-clip:text;color:transparent}
  .playbook h2{font-family:var(--disp);font-size:16px;color:var(--brand);text-transform:none;letter-spacing:0;margin:22px 0 6px}
  .playbook h3{font-size:13px;color:var(--ink);margin:14px 0 4px}
  .playbook li{margin:4px 0 4px 18px}.playbook code{font-size:13px}
  .playbook b{color:var(--ink)}.playbook p{color:#aebccb;margin:7px 0}
  /* scrollbar */
  ::-webkit-scrollbar{width:11px;height:11px}
  ::-webkit-scrollbar-thumb{background:rgba(120,150,200,.22);border-radius:8px;border:2px solid transparent;background-clip:padding-box}
  ::-webkit-scrollbar-thumb:hover{background:rgba(120,150,200,.4);background-clip:padding-box}
  ::selection{background:rgba(143,179,196,.32);color:#fff}

  /* ---------- scroll progress beam ---------- */
  #prog{position:fixed;top:0;left:0;right:0;height:3px;z-index:55;transform:scaleX(0);transform-origin:0 50%;
    background:linear-gradient(90deg,var(--cyan),var(--brand),var(--brand2));box-shadow:0 0 14px var(--brand)}

  /* ---------- cinematic boot intro ---------- */
  #boot{position:fixed;inset:0;z-index:60;display:grid;place-items:center;cursor:pointer;
    background:radial-gradient(circle at 50% 42%,#0a1120,#04060c 72%)}
  #boot.gone{opacity:0;visibility:hidden;transform:scale(1.05);transition:opacity .9s cubic-bezier(.6,0,.2,1),transform .9s cubic-bezier(.6,0,.2,1)}
  #boot .bw{text-align:center;display:flex;flex-direction:column;align-items:center;gap:16px}
  #boot .borb{width:62px;height:62px;border-radius:50%;background:conic-gradient(from 0deg,var(--cyan),var(--brand),var(--brand2),var(--cyan));
    box-shadow:0 0 70px rgba(143,179,196,.65);animation:spin 2.6s linear infinite, orbIn 1s cubic-bezier(.2,.9,.2,1) both;position:relative}
  #boot .borb::after{content:"";position:absolute;inset:10px;border-radius:50%;background:#060a12}
  #boot .borb::before{content:"";position:absolute;inset:-10px;border-radius:50%;border:1px solid rgba(143,179,196,.25);animation:ping 2.6s ease-out infinite}
  @keyframes ping{0%{transform:scale(.8);opacity:.8}100%{transform:scale(1.6);opacity:0}}
  #boot .bt{font-family:var(--disp);font-weight:700;font-size:26px;letter-spacing:.55em;padding-left:.55em;
    background:linear-gradient(90deg,#e8ecee,#acc6d6);-webkit-background-clip:text;background-clip:text;color:transparent;
    opacity:0;animation:bootTxt .9s ease .3s forwards}
  #boot .bs{font-family:var(--mono);font-size:9.5px;letter-spacing:.34em;color:var(--dim);opacity:0;animation:bootTxt .9s ease .55s forwards}
  #boot .bconsole{margin-top:12px;font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;color:var(--dim);width:320px;max-width:80vw;display:flex;flex-direction:column;gap:5px}
  #boot .bline{display:flex;justify-content:space-between;gap:18px;opacity:0;transform:translateY(5px);animation:blineIn .35s ease forwards}
  #boot .bline span:first-child{color:var(--faint)}
  #boot .bline .pend{color:var(--brand2)}
  #boot .bline .ok{color:var(--ok)}
  #boot .bskip{margin-top:8px;font-family:var(--mono);font-size:9px;letter-spacing:.25em;color:rgba(152,164,176,.5);opacity:0;animation:bootTxt 1s ease 1.4s forwards}
  @keyframes orbIn{from{opacity:0;transform:scale(.3)}}
  @keyframes bootTxt{to{opacity:1}}
  @keyframes blineIn{to{opacity:1;transform:none}}

  /* ---------- HUD: scanlines + cursor spotlight + tilt ---------- */
  #scan{position:fixed;inset:0;z-index:25;pointer-events:none;opacity:.5;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,0) 0,rgba(0,0,0,0) 2px,rgba(8,12,20,.35) 3px,rgba(8,12,20,0) 4px);mix-blend-mode:overlay}
  #scan::after{content:"";position:absolute;left:0;right:0;height:140px;top:-160px;
    background:linear-gradient(180deg,transparent,rgba(143,179,196,.06),transparent);animation:sweep 9s linear infinite}
  @keyframes sweep{to{top:110%}}
  .card,.tcard{--mx:50%;--my:50%}
  .card::after,.tcard::after{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;opacity:0;transition:opacity .35s;z-index:0;
    background:radial-gradient(280px circle at var(--mx) var(--my),rgba(143,179,196,.16),transparent 62%)}
  .card:hover::after,.tcard:hover::after{opacity:1}
  .card>*,.tcard>*{position:relative;z-index:1}
  /* hero corner brackets */
  .hero .cb{position:absolute;width:26px;height:26px;border:1px solid rgba(143,179,196,.4);pointer-events:none}
  .hero .cb.tl{left:14px;top:14px;border-right:0;border-bottom:0}
  .hero .cb.tr{right:14px;top:14px;border-left:0;border-bottom:0}
  .hero .cb.bl{left:14px;bottom:14px;border-right:0;border-top:0}
  .hero .cb.br{right:14px;bottom:14px;border-left:0;border-top:0}

  /* ---------- scroll-driven cinema (native, progressive enhancement) ---------- */
  @supports (animation-timeline: view()){
    .card,.tcard,.stat,.section-h,.kc{animation:reveal both;animation-timeline:view();animation-range:entry 0% cover 34%}
    @keyframes reveal{from{opacity:0;transform:translateY(40px) scale(.965);filter:blur(8px)}to{opacity:1;transform:none;filter:blur(0)}}
    .hero{animation:heroPar both;animation-timeline:scroll(root);animation-range:0 78vh}
    @keyframes heroPar{to{transform:translateY(38px) scale(.96);opacity:.5;filter:blur(2px)}}
    .hero .lead{animation:leadPar both;animation-timeline:scroll(root);animation-range:0 60vh}
    @keyframes leadPar{to{transform:translateY(-18px);letter-spacing:.01em}}
    #prog{animation:progFill both;animation-timeline:scroll(root)}
    @keyframes progFill{to{transform:scaleX(1)}}
    h2,.playbook{animation:reveal both;animation-timeline:view();animation-range:entry 0% cover 30%}
  }
  @media(prefers-reduced-motion:reduce){*{animation:none!important}#boot{display:none}}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div id="fx"></div>
<div id="grid"></div>
<div id="prog"></div>
<div id="scan"></div>
<div id="boot"><div class="bw"><div class="borb"></div><div class="bt">REALIZER</div><div class="bs">SOVEREIGN BID COMMAND DECK</div><div class="bconsole" id="bconsole"></div><div class="bskip">click to enter</div></div></div>
<header>
  <span class="brand"><span class="orb"></span><b>REALIZER</b></span>
  <span class="priv">PRIVATE · LOCAL</span>
  <nav>
    <button class="tab active" data-view="today">Today</button>
    <button class="tab" data-view="now">Act now</button>
    <button class="tab" data-view="teaming">Teaming</button>
    <button class="tab" data-view="pipeline">Pipeline</button>
    <button class="tab" data-view="profit">Profit</button>
    <button class="tab" data-view="all">All</button>
    <button class="tab" data-view="playbook">Playbook</button>
    <span class="tab-ind"></span>
  </nav>
  <span class="spacer"></span>
  <span id="stat" class="meta"></span>
  <button class="act" id="refresh"><svg class="ic-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3.5V9h-5.5"/></svg> Refresh</button>
</header>
<main>
  <section id="view-today" class="view"></section>
  <section id="view-now" class="view" hidden></section>
  <section id="view-teaming" class="view" hidden></section>
  <section id="view-pipeline" class="view" hidden></section>
  <section id="view-profit" class="view" hidden></section>
  <section id="view-all" class="view" hidden></section>
  <section id="view-playbook" class="view" hidden></section>
</main>
<div id="overlay"></div>
<aside id="assist" aria-label="Claude bid assistant">
  <div class="ah">
    <button class="x" id="assist-close" title="close">×</button>
    <div class="who">CLAUDE · BID STRATEGIST</div>
    <div class="ot" id="assist-title">—</div>
    <div class="om" id="assist-meta"></div>
    <div id="assist-poc"></div>
  </div>
  <div class="qa" id="assist-qa"></div>
  <div id="thread"></div>
  <div class="ask">
    <textarea id="assist-input" placeholder="Ask Claude about this bid…" rows="1"></textarea>
    <button id="assist-send">Ask</button>
  </div>
</aside>
<script type="module" src="/app.js"></script>
</body>
</html>
