<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bid Workspace — private</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Ccircle%20cx='16'%20cy='16'%20r='13'%20fill='none'%20stroke='%235eb1ff'%20stroke-width='2'/%3E%3Ccircle%20cx='16'%20cy='16'%20r='4'%20fill='%23e3b341'/%3E%3C/svg%3E">

<style>
  :root{--bg:#0a0f16;--panel:#0f1620;--panel2:#131c28;--line:#1e2a3a;--ink:#e8eef6;--dim:#8aa0b8;--brand:#5eb1ff;--ok:#35d07f;--warn:#e3b341;--bad:#ff6b6b;--mono:ui-monospace,"Cascadia Mono",Menlo,Consolas,monospace}
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1200px 600px at 85% -10%,#13243a 0%,var(--bg) 55%);color:var(--ink);font:15px/1.5 ui-sans-serif,system-ui,sans-serif}
  header{display:flex;align-items:center;gap:18px;padding:16px 24px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(10,15,22,.92);backdrop-filter:blur(6px);z-index:5}
  .brand{font-family:var(--mono);letter-spacing:.28em;font-weight:700;color:#cfe0f2;font-size:14px}
  .priv{font-family:var(--mono);font-size:11px;color:var(--warn);border:1px solid #4a3c12;border-radius:999px;padding:2px 8px}
  nav{display:flex;gap:4px;margin-left:8px}
  .tab{background:none;border:1px solid transparent;color:var(--dim);font:inherit;padding:6px 14px;border-radius:8px;cursor:pointer}
  .tab.active{color:var(--ink);background:var(--panel2);border-color:var(--line)}
  .spacer{flex:1}
  button.act{background:var(--panel2);border:1px solid var(--line);color:var(--ink);font:inherit;padding:6px 12px;border-radius:8px;cursor:pointer}
  button.act:hover{border-color:var(--brand)}
  main{padding:22px 24px;max-width:1280px;margin:0 auto}
  h2{font-size:15px;letter-spacing:.04em;color:var(--dim);text-transform:uppercase;margin:0 0 14px}
  .sub{color:var(--dim);font-size:13px;margin:-8px 0 18px}
  .grid{display:grid;gap:12px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .card.now{border-left:3px solid var(--warn)}
  .ctop{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
  .ctitle{font-weight:600;line-height:1.3}
  .ctitle a{color:var(--ink);text-decoration:none}
  .ctitle a:hover{color:var(--brand);text-decoration:underline}
  .meta{font-family:var(--mono);font-size:12px;color:var(--dim);margin-top:4px;display:flex;flex-wrap:wrap;gap:10px}
  .score{font-family:var(--mono);font-weight:700;font-size:20px;text-align:right;min-width:42px}
  .score small{display:block;font-weight:400;font-size:10px;color:var(--dim)}
  .bars{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
  .bar{font-family:var(--mono);font-size:11px;color:var(--dim);background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:2px 7px}
  .bar b{color:var(--ink)}
  .asset{color:var(--brand)}
  .soon{color:var(--warn)} .exp{color:var(--bad)}
  .ctl{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center}
  select,textarea{background:var(--panel2);border:1px solid var(--line);color:var(--ink);font:inherit;border-radius:8px;padding:6px 8px}
  textarea{flex:1;min-width:200px;resize:vertical;min-height:34px;font-size:13px}
  .pill{font-family:var(--mono);font-size:11px;padding:2px 8px;border-radius:999px;border:1px solid var(--line);color:var(--dim)}
  .pill.bid{color:var(--ok);border-color:#1c5238}.pill.nobid{color:var(--bad);border-color:#5a2330}
  .kanban{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;align-items:start}
  .col h3{font-size:12px;font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin:0 0 8px;display:flex;justify-content:space-between}
  .col{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px;min-height:60px}
  .kc{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:9px 10px;margin-bottom:8px}
  .kc .t{font-size:13px;font-weight:600;line-height:1.25}
  .kc .m{font-family:var(--mono);font-size:11px;color:var(--dim);margin-top:3px}
  input.filter{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--ink);font:inherit;border-radius:10px;padding:10px 14px;margin-bottom:16px}
  .empty{color:var(--dim);font-style:italic;padding:8px}
  @media(max-width:900px){.kanban{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<header>
  <span class="brand">◎ BID WORKSPACE</span>
  <span class="priv">PRIVATE · LOCAL</span>
  <nav>
    <button class="tab active" data-view="now">Act now</button>
    <button class="tab" data-view="pipeline">Pipeline</button>
    <button class="tab" data-view="all">All opportunities</button>
  </nav>
  <span class="spacer"></span>
  <span id="stat" class="meta"></span>
  <button class="act" id="refresh">↻ Refresh</button>
</header>
<main>
  <section id="view-now" class="view"></section>
  <section id="view-pipeline" class="view" hidden></section>
  <section id="view-all" class="view" hidden></section>
</main>
<script type="module" src="/app.js"></script>
</body>
</html>
